<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lending Curators, AUM & Asset Type</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Deterministic shell placement: topbar(row1) / sidebar+main(row2) / statusbar(row3) */
    .shell > .sidebar { grid-column: 1; grid-row: 2; }
    .shell > .main { grid-column: 2; grid-row: 2; }
    /* Allow flex/grid panels to shrink below intrinsic content width (prevents overflow) */
    .panel { min-width: 0; }
    /* Make fixed-width chart SVGs (Treemap) scale to their panel instead of clipping at the border */
    .fluid-svg svg { width: 100%; height: auto; display: block; }
    .metric:last-child { border-right: none; }
    .metric-footer { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    /* comparison bars (GoldFish pages) */
    .cmp-track { height: 22px; background: var(--bg-elev); border-radius: 4px; overflow: hidden; }
    .cmp-fill { height: 100%; border-radius: 4px; }
    .nav-section { font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--fg-dim); padding: 14px 12px 4px; }
  </style>
</head>
<body data-theme="dark" data-aesthetic="evolved" data-density="cozy">
  <script>
  (function () {
    try {
      var t = localStorage.getItem('theme'), a = localStorage.getItem('aesthetic'), d = localStorage.getItem('density');
      if (t) document.body.setAttribute('data-theme', t);
      if (a) document.body.setAttribute('data-aesthetic', a);
      if (d) document.body.setAttribute('data-density', d);
    } catch (e) {}
  })();
  </script>
  <div id="root" class="shell"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script src="lending_curators.data.js?v=20260611190000"></script>
  <script src="goldfish.data.js?v=20260611190000"></script>
  <script type="text/babel" src="charts.jsx"></script>
  <script type="text/babel" src="widgets.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const { useState, useMemo } = React;
    const D = window.CURATOR_DATA;
    const AC = D.assetColors;

    const fmtUSD = (v) => {
      if (v >= 1e9) return '$' + (v / 1e9).toFixed(2) + 'B';
      if (v >= 1e6) return '$' + (v / 1e6).toFixed(1) + 'M';
      if (v >= 1e3) return '$' + (v / 1e3).toFixed(0) + 'K';
      return '$' + v.toFixed(0);
    };
    const pct = (v) => (v * 100).toFixed(0) + '%';
    const shortAddr = (a) => a ? a.slice(0, 6) + '…' + a.slice(-4) : null;
    const ethscan = (a) => 'https://etherscan.io/address/' + a;
    // curator name cell: link to on-chain controlling address (verifiable on Etherscan)
    function CuratorName({ name, address, morphoListed }) {
      return (
        <span>
          {address ? <a href={ethscan(address)} target="_blank" rel="noopener" style={{ color: 'var(--fg)', textDecoration: 'none', borderBottom: '1px dotted var(--fg-dim)' }}>{name}</a> : name}
          {morphoListed && <span title="Morpho curator registry listing (not independent verification)" style={{ color: 'var(--fg-dim)', marginLeft: 6, fontSize: 10, fontFamily: 'var(--font-mono)' }}>ML</span>}
          {address
            ? <div style={{ fontSize: 10, color: 'var(--fg-dim)', fontFamily: 'var(--font-mono)', fontWeight: 400 }}>{shortAddr(address)}</div>
            : <div style={{ fontSize: 10, color: 'var(--fg-dim)', fontWeight: 400 }}>no registered address</div>}
        </span>
      );
    }
    const ASSET_TYPES = Object.keys(AC);
    const TIERS = ["Mega (>$500M)", "Large ($100M–500M)", "Mid ($25M–100M)", "Small ($5M–25M)", "Emerging (<$5M)"];

    // ── mini stacked bar for a curator's asset profile ──
    function AssetBar({ byAssetType, width = 160 }) {
      const total = Object.values(byAssetType).reduce((a, b) => a + b, 0) || 1;
      const segs = ASSET_TYPES.filter(t => byAssetType[t] > 0).map(t => ({ t, w: byAssetType[t] / total }));
      return (
        <div style={{ display: 'flex', width, height: 10, borderRadius: 3, overflow: 'hidden', background: 'var(--bg-elev)' }} title={Object.entries(byAssetType).map(([k,v])=>`${k} ${pct(v/total)}`).join(' · ')}>
          {segs.map(s => <div key={s.t} style={{ width: pct(s.w), background: AC[s.t] }} />)}
        </div>
      );
    }

    function Legend({ keys }) {
      return (
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 12, marginTop: 10 }}>
          {keys.map(k => (
            <div key={k} style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 11, color: 'var(--fg-muted)' }}>
              <span style={{ width: 10, height: 10, borderRadius: 2, background: AC[k] }} />{k}
            </div>
          ))}
        </div>
      );
    }

    // ═══════════════ OVERVIEW ═══════════════
    function Overview() {
      const cur = D.curators;
      const btcShare = (D.agg.byAssetType['BTC'] || 0) / D.meta.totalAumUsd;
      const top = cur[0];
      const kpis = [
        { l: 'Total Curated AUM', v: fmtUSD(D.meta.totalAumUsd), d: 'Morpho + Euler Earn' },
        { l: 'Curators', v: String(D.meta.curatorCount), d: D.meta.protocols.join(' · ') },
        { l: 'Largest Curator', v: fmtUSD(top.aumUsd), d: top.name + ' · ' + top.protocol },
        { l: 'BTC Collateral Share', v: pct(btcShare), d: 'of all curated AUM' },
      ];
      // disambiguate same-name curators across protocols (Treemap keys by name)
      const nameCount = {};
      cur.forEach(c => { nameCount[c.name] = (nameCount[c.name] || 0) + 1; });
      const treeItems = cur.filter(c => c.aumUsd > 0).map(c => ({
        id: c.protocol + ':' + c.name,
        name: nameCount[c.name] > 1 ? `${c.name} (${c.protocol})` : c.name,
        value: c.aumUsd, color: AC[c.dominantAssetType] || 'var(--fg-muted)',
      }));
      const assetDonut = Object.entries(D.agg.byAssetType).map(([k, v]) => ({ name: k, value: v, color: AC[k] }));
      const chainDonut = Object.entries(D.agg.byChain).sort((a,b)=>b[1]-a[1]).map(([k, v], i) => ({ name: k, value: v, color: ['var(--orange)','var(--blue)','var(--green)','var(--purple)','var(--yellow)','var(--red)'][i] || 'var(--fg-muted)' }));
      // stacked bar: tiers x asset types
      const barData = TIERS.map(t => {
        const row = { label: t.split(' ')[0] };
        for (const at of ASSET_TYPES) row[at] = 0;
        for (const c of cur.filter(c => c.sizeTier === t)) for (const [at, v] of Object.entries(c.byAssetType)) row[at] += v;
        return row;
      });
      return (
        <section style={{ padding: 24 }}>
          <h1 className="h1">Lending Protocol Curators</h1>
          <p className="sub" style={{ marginTop: 6 }}>
            Asset managers allocating depositor capital on permissionless lending protocols, by AUM and collateral type. Ethereum-first, all chains.
          </p>

          <div className="panel" style={{ marginTop: 22 }}>
            <div className="grid grid-4" style={{ gap: 0 }}>
              {kpis.map(k => (
                <div key={k.l} className="metric" style={{ cursor: 'default' }}>
                  <div className="metric-label">{k.l}</div>
                  <div className="metric-value">{k.v}</div>
                  <div className="metric-footer">{k.d}</div>
                </div>
              ))}
            </div>
          </div>

          <div className="grid" style={{ gridTemplateColumns: '1.4fr 1fr', gap: 16, marginTop: 16 }}>
            <div className="panel">
              <div className="panel-header"><div className="panel-title">Curators by AUM, colored by dominant asset type</div></div>
              <div className="panel-body">
                <div className="fluid-svg"><Treemap items={treeItems} width={620} height={320} /></div>
                <Legend keys={ASSET_TYPES.filter(t => (D.agg.byAssetType[t]||0) > 0)} />
              </div>
            </div>
            <div className="panel">
              <div className="panel-header"><div className="panel-title">AUM by Asset Type</div></div>
              <div className="panel-body"><Donut items={assetDonut} size={190} thickness={32} centerLabel={fmtUSD(D.meta.totalAumUsd)} /></div>
            </div>
          </div>

          <div className="grid" style={{ gridTemplateColumns: '1fr 1fr', gap: 16, marginTop: 16 }}>
            <div className="panel">
              <div className="panel-header"><div className="panel-title">AUM by Size Tier × Asset Type</div></div>
              <div className="panel-body"><StackedBarChart data={barData} keys={ASSET_TYPES} colors={ASSET_TYPES.map(t => AC[t])} labels width={560} height={240} /></div>
            </div>
            <div className="panel">
              <div className="panel-header"><div className="panel-title">AUM by Chain (Ethereum-first)</div></div>
              <div className="panel-body"><Donut items={chainDonut} size={190} thickness={32} centerLabel={String(Object.keys(D.agg.byChain).length) + ' chains'} /></div>
            </div>
          </div>
        </section>
      );
    }

    // ═══════════════ CURATORS TABLE ═══════════════
    function Curators() {
      const [protocols, setProtocols] = useState([]);
      const [assets, setAssets] = useState([]);
      const [tiers, setTiers] = useState([]);
      const [sort, setSort] = useState('aum');
      const [ethFirst, setEthFirst] = useState(false);

      let rows = D.curators.filter(c =>
        (!protocols.length || c.protocols.some(p => protocols.includes(p.protocol))) &&
        (!assets.length || assets.some(a => (c.byAssetType[a] || 0) > 0)) &&
        (!tiers.length || tiers.includes(c.sizeTier))
      );
      // exposure to the selected asset type(s), used to annotate + sort when filtering
      const selExposure = (c) => assets.reduce((s, a) => s + (c.byAssetType[a] || 0), 0);
      rows = rows.map(c => ({ ...c, sortAum: ethFirst ? (c.byChain['Ethereum'] || 0) : c.aumUsd, sel: selExposure(c) }));
      rows.sort((a, b) =>
        sort === 'name' ? a.name.localeCompare(b.name)
        : assets.length ? b.sel - a.sel          // when filtering by asset, rank by that exposure
        : b.sortAum - a.sortAum);
      const selTotal = rows.reduce((s, c) => s + c.sel, 0);

      const th = { textAlign: 'left', padding: '8px 10px', fontSize: 11, color: 'var(--fg-muted)', textTransform: 'uppercase', letterSpacing: '.04em', borderBottom: '1px solid var(--border)', cursor: 'pointer' };
      const td = { padding: '9px 10px', fontSize: 13, borderBottom: '1px solid var(--border-subtle, var(--border))' };

      return (
        <section style={{ padding: 24 }}>
          <h1 className="h1">Curators</h1>
          <p className="sub" style={{ marginTop: 6 }}>{
            assets.length
              ? `${rows.length} curators with ${assets.join(' / ')} exposure · ${fmtUSD(selTotal)} allocated to ${assets.length > 1 ? 'these types' : 'this type'}`
              : `${rows.length} curators · sort and filter by protocol, asset type, and size.`
          }</p>

          <div style={{ display: 'flex', gap: 10, marginTop: 16, flexWrap: 'wrap', alignItems: 'center' }}>
            <Dropdown label="Protocol" multi selected={protocols} items={D.meta.protocols.filter(p=>p!=='Aave').map(p => ({ id: p, label: p }))} onChange={setProtocols} />
            <Dropdown label="Asset Type" multi selected={assets} items={ASSET_TYPES.map(a => ({ id: a, label: a }))} onChange={setAssets} />
            <Dropdown label="Size Tier" multi selected={tiers} items={TIERS.map(t => ({ id: t, label: t }))} onChange={setTiers} />
            <button className={`chip ${ethFirst ? 'active' : ''}`} onClick={() => setEthFirst(v => !v)}
              style={{ cursor: 'pointer', background: ethFirst ? 'var(--orange)' : 'var(--bg-elev)', color: ethFirst ? '#000' : 'var(--fg-muted)', border: '1px solid var(--border)', borderRadius: 6, padding: '7px 12px', fontSize: 12 }}>
              {ethFirst ? '◉' : '○'} Rank by Ethereum AUM
            </button>
            {(protocols.length || assets.length || tiers.length) ? (
              <button onClick={() => { setProtocols([]); setAssets([]); setTiers([]); }}
                style={{ cursor: 'pointer', background: 'transparent', color: 'var(--fg-muted)', border: '1px solid var(--border)', borderRadius: 6, padding: '7px 12px', fontSize: 12 }}>
                ✕ Clear filters
              </button>
            ) : null}
          </div>

          <div className="panel" style={{ marginTop: 16, padding: 0, overflow: 'hidden' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse' }}>
              <thead><tr>
                <th style={th}>#</th>
                <th style={th} onClick={() => setSort('name')}>Curator</th>
                <th style={th}>Protocol</th>
                <th style={{ ...th, textAlign: 'right' }} onClick={() => setSort('aum')}>{ethFirst ? 'ETH AUM' : 'AUM'} ▾</th>
                <th style={th}>Size Tier</th>
                <th style={th}>Asset Profile</th>
                <th style={{ ...th, textAlign: 'right' }}>Vaults</th>
                <th style={{ ...th, textAlign: 'right' }}>Chains</th>
              </tr></thead>
              <tbody>
                {rows.map((c, i) => (
                  <tr key={c.protocol + c.name} style={{ transition: 'background .1s' }}
                    onMouseEnter={e => e.currentTarget.style.background = 'var(--bg-elev)'}
                    onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                    <td style={{ ...td, fontFamily: 'var(--font-mono)', color: 'var(--fg-dim)' }}>{String(i + 1).padStart(2, '0')}</td>
                    <td style={{ ...td, fontWeight: 600 }}><CuratorName name={c.name} address={c.address} morphoListed={c.morphoListed} /></td>
                    <td style={td}><div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>{c.protocols.map(p => (
                      <span key={p.protocol} title={`${p.protocol}: ${fmtUSD(p.aumUsd)} · ${p.vaultCount} vaults`} style={{ fontSize: 11, padding: '2px 7px', borderRadius: 4, background: p.protocol === 'Morpho' ? 'rgba(99,102,241,.15)' : 'rgba(34,197,94,.15)', color: p.protocol === 'Morpho' ? 'var(--blue)' : 'var(--green)' }}>{p.protocol}</span>
                    ))}</div></td>
                    <td style={{ ...td, textAlign: 'right', fontFamily: 'var(--font-mono)', fontWeight: 600 }}>{fmtUSD(c.sortAum)}</td>
                    <td style={{ ...td, color: 'var(--fg-muted)', fontSize: 12 }}>{c.sizeTier.split(' (')[0]}</td>
                    <td style={td}><div style={{ display: 'flex', alignItems: 'center', gap: 8 }}><AssetBar byAssetType={c.byAssetType} /><span style={{ fontSize: 11, color: 'var(--fg-muted)', fontFamily: assets.length ? 'var(--font-mono)' : undefined }}>{assets.length ? `${fmtUSD(c.sel)} (${pct(c.sel / c.aumUsd)})` : c.dominantAssetType.split(' ')[0]}</span></div></td>
                    <td style={{ ...td, textAlign: 'right', fontFamily: 'var(--font-mono)', color: 'var(--fg-muted)' }}>{c.vaultCount}</td>
                    <td style={{ ...td, textAlign: 'right', fontFamily: 'var(--font-mono)', color: 'var(--fg-muted)' }}>{c.chains.length}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {/* Aave risk managers, separate category */}
          <h2 className="h2" style={{ marginTop: 32, fontSize: 16 }}>Risk Service Providers <span style={{ fontSize: 12, fontWeight: 400, color: 'var(--fg-muted)' }}>- advisory, not capital allocation (excluded from AUM ranking)</span></h2>
          <div className="grid grid-2" style={{ gap: 16, marginTop: 12 }}>
            {D.riskManagers.map(m => (
              <div key={m.name} className="panel" style={{ padding: 16 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
                  <div style={{ fontWeight: 600, fontSize: 15 }}>{m.name}</div>
                  <span style={{ fontSize: 11, padding: '2px 7px', borderRadius: 4, background: 'rgba(168,85,247,.15)', color: 'var(--purple)' }}>{m.protocol} · risk manager</span>
                </div>
                <div style={{ fontSize: 12, color: 'var(--fg-muted)', marginTop: 8 }}>{m.scope}</div>
                <div style={{ fontSize: 12, marginTop: 10, fontFamily: 'var(--font-mono)' }}>Oversees ≈ {fmtUSD(m.overseesUsd)} <span style={{ color: 'var(--fg-dim)' }}>Aave v3 TVL (shared advisory scope)</span></div>
                <div style={{ fontSize: 11, marginTop: 8 }}>DAO-appointed; on-chain RiskSteward/ACL roles · <a href={m.govSource || 'https://governance.aave.com'} target="_blank" rel="noopener" style={{ color: 'var(--blue)', textDecoration: 'none' }}>Aave governance</a></div>
              </div>
            ))}
          </div>
        </section>
      );
    }

    // ═══════════════ METHODOLOGY ═══════════════
    function Method() {
      const mono = { fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--blue)' };
      const Row = ({ k, v }) => (
        <div style={{ display: 'flex', gap: 16, padding: '10px 0', borderBottom: '1px solid var(--border)' }}>
          <div style={{ width: 190, color: 'var(--fg-muted)', fontSize: 13, flexShrink: 0 }}>{k}</div>
          <div style={{ fontSize: 13, lineHeight: 1.6 }}>{v}</div>
        </div>
      );
      const Sec = ({ n, title, sub, children }) => (
        <div className="panel" style={{ padding: 20, marginTop: 16 }}>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, marginBottom: 6 }}>
            <span style={{ fontFamily: 'var(--font-mono)', color: 'var(--orange)', fontSize: 13 }}>{n}</span>
            <span style={{ fontWeight: 600, fontSize: 15 }}>{title}</span>
          </div>
          {sub && <div style={{ fontSize: 12, color: 'var(--fg-muted)', marginBottom: 10 }}>{sub}</div>}
          {children}
        </div>
      );
      const M = ({ children }) => <code style={mono}>{children}</code>;
      return (
        <section style={{ padding: 24, maxWidth: 900 }}>
          <h1 className="h1">Methodology & Data Sources</h1>
          <p className="sub" style={{ marginTop: 6 }}>Sources and method per dataset. GGBR TVL and backing are from the GoldfishGold Dune dashboard; all other figures are pulled live (endpoints below).</p>

          <Sec n="00" title="Pipeline, how to regenerate everything" sub="Node ≥18, run from /scripts. Each writes JSON consumed by this static page (no backend).">
            <Row k="Curator dataset" v={<span><M>pull_morpho.mjs</M> → <M>classify.mjs</M> → <M>probe_euler.mjs</M> → <M>build.mjs</M> ⟶ <M>lending_curators.data.js</M></span>} />
            <Row k="GoldFish dataset" v={<span><M>goldfish_prep.mjs</M> ⟶ <M>goldfish.data.js</M> (pulls Morpho + DefiLlama + CoinGecko live each run)</span>} />
            <Row k="Refresh" v="Re-run the scripts; both data files are versioned (?v=timestamp) so the live site picks up changes immediately. Snapshot timestamp shown in the footer." />
          </Sec>

          <Sec n="01" title="Curator universe, Morpho" sub="The bulk of curated AUM. Overview + Curators pages.">
            <Row k="Endpoint" v={<M>POST blue-api.morpho.org/graphql</M>} />
            <Row k="Identity query" v={<span><M>curators</M> → name, on-chain addresses, socials, state.aum. Each curator name links to its <b>on-chain controlling address</b> (verifiable on Etherscan). The "ML" tag = Morpho registry listing, not independent verification.</span>} />
            <Row k="Vaults query" v={<span><M>vaults</M> (paginated 100/page, all chains, orderBy TotalAssetsUsd) → state.totalAssetsUsd, state.curators[].name, state.allocation[] {`{`} supplyAssetsUsd, supplyCapUsd, enabled, market.collateralAsset/loanAsset {`}`}.</span>} />
            <Row k="Roll-up" v="Vault TVL → curator. Co-curated vaults split evenly across curators. Collateral exposure distributed proportionally by each market's supplyAssetsUsd → gives the asset-type mix per curator." />
            <Row k="Filters" v="Keep vaults ≥ $10k TVL with a named (registered) curator. Addr-only vaults (~5% of TVL) excluded, they lack a verifiable curator identity." />
          </Sec>

          <Sec n="02" title="Curator universe, Euler & Aave">
            <Row k="Euler" v={<span>Goldsky subgraphs <M>euler-v2-{`{chain}`}</M> (mainnet/base/arbitrum/unichain), <M>eulerEarnVaults</M>. Raw balances priced via <M>coins.llama.fi/prices/current</M>. Manager brand derived from vault name. Euler Earn is nascent (~$13M).</span>} />
            <Row k="Aave (why separate)" v={<span>Aave core markets are DAO-governed, no capital-allocating curators, only risk advisors (Gauntlet, Chaos Labs). Shown as a separate category, excluded from AUM rankings. Oversight anchored to <M>api.llama.fi/tvl/aave-v3</M>.</span>} />
            <Row k="Identity merge" v="Same-name curators across protocols are merged into one row with a per-protocol breakdown (e.g. Clearstar, Hyperithm on Morpho + Euler)." />
          </Sec>

          <Sec n="03" title="Asset-type classification" sub="classify.mjs / build.mjs, first-match regex on collateral symbol. Editorial & auditable.">
            <Row k="Buckets" v="BTC · ETH/LST/LRT · Stablecoin · RWA/Credit · Pendle/Fixed-term · Altcoin/L1 · Other." />
            <Row k="Judgment calls" v="Maple (syrupUSDC/USDT) classed as RWA/Credit (on-chain private credit), not Stablecoin. Pendle PT-* checked before the underlying. Gold/equities/treasuries → RWA/Credit." />
            <Row k="Size tiers" v="Mega >$500M · Large $100–500M · Mid $25–100M · Small $5–25M · Emerging <$5M." />
          </Sec>

          <Sec n="04" title="GoldFish / GGBR figures (Activation Gap)" sub="Market data live; only TVL & backing are Dune-sourced.">
            <Row k="GGBR market (live)" v={<span>Price, circulating supply, circulating mcap, total supply & FDV from <M>api.coingecko.com/api/v3/coins/markets</M> (id goldfish-gold); price cross-checked via <M>coins.llama.fi/prices/current/coingecko:goldfish-gold</M>. Live: ~$4.23, 5.7M circ ($24M mcap), 25M total ($104M FDV).</span>} />
            <Row k="Circulating vs FDV" v={<span><b>Activation is measured against circulating mcap (~$24M), not FDV (~$104M)</b>, un-issued tokens can't be deposited. So ~26% of circulating GGBR is in DeFi (not 6% of FDV). The ~$81M un-issued is FDV headroom (mint/distribute), a separate lever.</span>} />
            <Row k="DeFi TVL & backing (Dune)" v={<span>DeFi TVL ~$6.2M, staked ~$1.3M, collateral-pledged backing ~$104M, read from the GoldfishGold Dune dashboard (<M>dune.com/goldfishgold_main</M>); hardcoded in goldfish_prep (Dune API needs a key).</span>} />
            <Row k="No on-chain TVL tracking" v="The TVL figure is GoldFish-reported. This dashboard does not track the GGBR staking contract, LP mint/burn events, or lending positions, the composition of that TVL is not independently verified. To verify, supply the staking/LP contract addresses." />
            <Row k="Tokenized-gold mcap" v={<span>XAUt + PAXG market caps + gold price live from <M>api.coingecko.com/api/v3/coins/markets</M> (ids pax-gold, tether-gold).</span>} />
          </Sec>

          <Sec n="05" title="Gold demand, cross-protocol" sub="Where tokenized gold is actually used as DeFi collateral.">
            <Row k="Gold collateral by protocol" v={<span><M>yields.llama.fi/pools</M> filtered to symbol XAU/PAXG and lending projects (aave, morpho, fluid, compound, euler…), aggregated by protocol. Aave is ~77% of all DeFi gold.</span>} />
            <Row k="Morpho gold markets" v={<span><M>blue-api markets</M> query for utilization detail. <b>Excludes a $1.2B PAXG/USDC ghost market</b> (supply==borrow against $0 posted collateral, a data glitch; filter: borrow &gt; $1M &amp;&amp; collateral &lt; borrow/2).</span>} />
            <Row k="Curator gold-readiness" v={<span>From Morpho vault <M>allocation[].supplyCapUsd + enabled</M> (caps pre-approved) vs <M>supplyAssetsUsd</M> (deployed). 3 curators (Steakhouse $45M, August Digital $20M, SingularV) enabled ~$65M of gold caps but deployed ~$1K.</span>} />
          </Sec>

          <Sec n="06" title="RWA partners, on-chain metrics" sub="RWA Partners page. All metrics live, no editorial ratings.">
            <Row k="RWA curators" v="From the Morpho curator dataset, curators holding RWA/credit collateral, with RWA $, total AUM, holdings, and X/site/forum contacts (from the Morpho curators query socials)." />
            <Row k="Credit-tranching protocols" v={<span>Per protocol, live: TVL + #pools + senior/junior tranche APY (by symbol) from <M>yields.llama.fi/pools</M>; 30d fees from <M>api.llama.fi/overview/fees</M>; fallback TVL from <M>api.llama.fi/protocols</M>. Spread = junior − senior APY (genuine tranching). Verifying live TVL corrected the research, Goldfinch/TrueFi/Credix have wound down.</span>} />
          </Sec>

          <Sec n="07" title="GGBR collateral, important caveat" sub="Why GGBR is treated as credit-like RWA, not vaulted gold.">
            <Row k="What backs GGBR" v={<span>IONau = a claim on <b>in-situ (in-ground) gold reserves</b> at <b>5:1 overcollateralization</b>, issued by I-ON Digital Corp (<M>OTCQB: IONI</M>). Backing is an off-chain legal/custody arrangement (NI 43-101 reserve report, UCC liens, Fireblocks custody) — confirmed via the issuer, not verifiable on-chain.</span>} />
            <Row k="GGBR token (on-chain)" v={<span>Contract <M>0x7e2ac793f3e692f388e66c7dc28f739d13b0b71a</M> (Ethereum). Token, supply and transfers are on-chain; the gold backing above is not.</span>} />
            <Row k="Implication" v="Not redeemable vaulted bar gold like PAXG/XAUt, it's a mining-reserve credit claim. GGBR is therefore treated as credit-like RWA, separate from the tokenized-gold peer set." />
          </Sec>

          <Sec n="08" title="Caveats">
            <Row k="Snapshot" v="AUM/TVL move with token prices. Figures are as of the footer timestamp; re-run scripts to refresh." />
            <Row k="Classification" v="Asset-type bucketing is symbol-based and editorial (auditable in classify.mjs)." />
            <Row k="TVL definition" v="DefiLlama TVL = value posted/supplied. Yields pools measure deposit tranches; protocol /tvl nets differently, the two can differ for the same protocol." />
            <Row k="GGBR figures" v="Hardcoded from the public Dune dashboard; provide Dune API access to make them live." />
          </Sec>

          <div style={{ marginTop: 16 }}>
            <DataSourceBadge source="Morpho · Euler (Goldsky) · DefiLlama · CoinGecko · Dune" lastUpdated={D.meta.generated} tone="green" />
          </div>
        </section>
      );
    }

    // ═══════════════ GOLDFISH (client TVL-growth analysis) ═══════════════
    const GF = window.GOLDFISH_DATA;
    const fmtPct = (v, d=1) => v.toFixed(d) + '%';
    const GC = { gold: 'var(--yellow)', live: 'var(--green)', idle: 'var(--fg-muted)', accent: 'var(--orange)', blue: 'var(--blue)' };
    const GPanel = ({ title, sub, children }) => (
      <div className="panel">
        <div className="panel-header"><div className="panel-title">{title}</div>{sub && <div style={{ fontSize: 11, color: 'var(--fg-muted)', fontFamily: 'var(--font-mono)' }}>{sub}</div>}</div>
        <div className="panel-body">{children}</div>
      </div>
    );
    const GKpiRow = ({ items }) => (
      <div className="panel"><div className="grid grid-4" style={{ gap: 0 }}>
        {items.map(k => (
          <div key={k.l} className="metric" style={{ cursor: 'default' }}>
            <div className="metric-label">{k.l}</div>
            <div className="metric-value" style={{ color: k.c }}>{k.v}</div>
            <div className="metric-footer">{k.d}</div>
          </div>
        ))}
      </div></div>
    );
    const GCmpBar = ({ rows, max, fmt }) => (
      <div>{rows.map(r => (
        <div key={r.label} style={{ margin: '14px 0' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, marginBottom: 5 }}>
            <span style={{ color: 'var(--fg-muted)' }}>{r.label}</span>
            <span style={{ fontFamily: 'var(--font-mono)', color: r.color }}>{fmt(r.value)}</span>
          </div>
          <div className="cmp-track"><div className="cmp-fill" style={{ width: Math.max(0.5, (r.value/max)*100)+'%', background: r.color }} /></div>
        </div>
      ))}</div>
    );

    function GFDemand() {
      const d = GF.demand;
      const protoColor = { Aave: GC.accent, Morpho: GC.blue, Fluid: 'var(--purple)', Compound: GC.live, Euler: GC.gold };
      const byProto = Object.entries(d.byProtocol || {}).sort((a,b)=>b[1]-a[1]);
      // Morpho market utilization (where gold is borrowed, it's heavily used)
      const borrowing = (d.markets||[]).filter(m => !m.ghost && m.borrowUsd > 0 && m.supplyUsd > 0);
      const avgUtil = borrowing.reduce((s,m)=>s+m.util*m.supplyUsd,0) / (borrowing.reduce((s,m)=>s+m.supplyUsd,0)||1);
      const gtd = { padding: '9px 10px', fontSize: 13, borderBottom: '1px solid var(--border)' };
      const gth = { textAlign: 'left', padding: '8px 10px', fontSize: 11, color: 'var(--fg-muted)', textTransform: 'uppercase', letterSpacing: '.04em', borderBottom: '1px solid var(--border)' };
      return (
        <section style={{ padding: 24 }}>
          <h1 className="h1">GoldFish · Tokenized gold in DeFi</h1>
          <p className="sub" style={{ marginTop: 6 }}>Tokenized-gold mcap vs gold posted as DeFi collateral, by protocol. Source: DefiLlama yields + Morpho markets.</p>
          <div style={{ marginTop: 20 }}>
            <GKpiRow items={[
              { l: 'Tokenized Gold Mcap', v: fmtUSD(d.tokGoldTotalUsd), d: 'XAUt + PAXG', c: GC.gold },
              { l: 'Gold as DeFi Collateral', v: fmtUSD(d.goldCollateralUsd), d: 'across all lending protocols', c: GC.live },
              { l: 'Category Activation', v: fmtPct(d.categoryActivationPct,1), d: 'of tokenized gold', c: GC.accent },
              { l: 'Venues', v: String(d.venueCount), d: 'lending protocols with gold', c: GC.blue },
            ]} />
          </div>
          <div className="grid" style={{ gridTemplateColumns: '1fr 1.3fr', gap: 16, marginTop: 16 }}>
            <GPanel title="Idle vs collateralized tokenized gold">
              <Donut size={190} thickness={32} centerLabel={fmtUSD(d.tokGoldTotalUsd)}
                items={[{ name: 'Idle (not in DeFi)', value: d.idleUsd, color: GC.idle }, { name: 'Posted as collateral', value: d.goldCollateralUsd, color: GC.live }]} />
            </GPanel>
            <GPanel title="Gold collateral by protocol" sub="Aave is ~77% of all DeFi gold">
              <GCmpBar fmt={fmtUSD} max={byProto[0] ? byProto[0][1] : 1}
                rows={byProto.map(([p,v]) => ({ label: p, value: v, color: protoColor[p] || GC.idle }))} />
            </GPanel>
          </div>
          <div className="grid" style={{ gridTemplateColumns: '1.5fr 1fr', gap: 16, marginTop: 16 }}>
            <GPanel title="Where gold collateral sits, and who governs it" sub="borrower-posted, not fund-curated">
              <table style={{ width: '100%', borderCollapse: 'collapse' }}>
                <thead><tr><th style={gth}>Venue</th><th style={gth}>Governance</th><th style={{...gth, textAlign:'right'}}>Gold $</th><th style={{...gth, textAlign:'center'}}>Fund?</th></tr></thead>
                <tbody>
                  {(d.venues||[]).map(m => (
                    <tr key={m.venue}>
                      <td style={{...gtd, fontWeight: 600, whiteSpace:'nowrap'}}>{m.venue}</td>
                      <td style={{...gtd, fontSize: 12, color:'var(--fg-muted)'}}>{m.governance}</td>
                      <td style={{...gtd, textAlign:'right', fontFamily:'var(--font-mono)'}}>{fmtUSD(m.usd)}</td>
                      <td style={{...gtd, textAlign:'center', color: GC.accent, fontSize: 12}}>No</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </GPanel>
            <GPanel title="Curator gold-readiness" sub="caps enabled vs capital deployed">
              <div style={{ fontSize: 13, lineHeight: 1.6 }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline' }}>
                  <span style={{ fontFamily:'var(--font-mono)', fontSize: 22, color: GC.gold }}>{fmtUSD(d.curatorCapacityUsd)}</span>
                  <span style={{ fontSize: 11, color:'var(--fg-muted)' }}>caps ENABLED</span>
                </div>
                <div className="cmp-track" style={{ margin:'6px 0 2px' }}><div className="cmp-fill" style={{ width:'100%', background: GC.gold }} /></div>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginTop: 12 }}>
                  <span style={{ fontFamily:'var(--font-mono)', fontSize: 18, color: GC.accent }}>{fmtUSD(d.curatorDeployedUsd)}</span>
                  <span style={{ fontSize: 11, color:'var(--fg-muted)' }}>DEPLOYED</span>
                </div>
                <div className="cmp-track" style={{ margin:'6px 0 2px' }}><div className="cmp-fill" style={{ width: Math.max(0.4,(d.curatorDeployedUsd/d.curatorCapacityUsd)*100)+'%', background: GC.accent }} /></div>
                <div style={{ marginTop: 12, color:'var(--fg-muted)' }}><b style={{color:'var(--fg)'}}>{d.readyCurators?.length} curators</b> have <b style={{color:'var(--fg)'}}>rated & pre-approved</b> gold markets, but deployed almost nothing. <b style={{color:'var(--fg)'}}>Gold-ready; demand-gated.</b></div>
              </div>
            </GPanel>
          </div>
          <div className="grid" style={{ gridTemplateColumns: '1fr 1.5fr', gap: 16, marginTop: 16 }}>
            <GPanel title="Curators that are gold-ready" sub="caps enabled · not deployed">
              <table style={{ width:'100%', borderCollapse:'collapse' }}>
                <thead><tr><th style={gth}>Curator</th><th style={{...gth,textAlign:'right'}}>Cap enabled</th><th style={{...gth,textAlign:'right'}}>Deployed</th></tr></thead>
                <tbody>
                  {(d.readyCurators||[]).map((c,i) => (
                    <tr key={i}>
                      <td style={{...gtd, fontWeight:600, whiteSpace:'nowrap'}}>{c.curator}{i===0 && <span title="largest gold capacity" style={{color:GC.gold, marginLeft:6}}>◆</span>}</td>
                      <td style={{...gtd, textAlign:'right', fontFamily:'var(--font-mono)', color:GC.gold}}>{fmtUSD(c.capUsd)}</td>
                      <td style={{...gtd, textAlign:'right', fontFamily:'var(--font-mono)', color:'var(--fg-muted)'}}>{fmtUSD(c.deployedUsd)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </GPanel>
            <GPanel title="Gold markets these curators have rated & enabled" sub="cap pre-approved · deployed">
              <table style={{ width:'100%', borderCollapse:'collapse' }}>
                <thead><tr><th style={gth}>Curator</th><th style={gth}>Market</th><th style={{...gth,textAlign:'right'}}>Cap</th><th style={{...gth,textAlign:'right'}}>Depl.</th></tr></thead>
                <tbody>
                  {(d.enabledMarkets||[]).filter(m=>m.capUsd>0).slice(0,7).map((m,i) => (
                    <tr key={i}>
                      <td style={{...gtd, fontSize:11, color:'var(--fg-muted)', whiteSpace:'nowrap'}}>{m.curator}</td>
                      <td style={{...gtd, fontWeight:600, whiteSpace:'nowrap'}}>{m.market}</td>
                      <td style={{...gtd, textAlign:'right', fontFamily:'var(--font-mono)', color:GC.gold}}>{fmtUSD(m.capUsd)}</td>
                      <td style={{...gtd, textAlign:'right', fontFamily:'var(--font-mono)', color:'var(--fg-muted)'}}>{fmtUSD(m.deployedUsd)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </GPanel>
            <div className="panel" style={{ padding: 16, fontSize: 13, color: 'var(--fg-muted)' }}>
              {d.readyCurators?.length} curators enabled ~{fmtUSD(d.curatorCapacityUsd)} of gold caps; ~$1K deployed. Morpho gold-market utilization (supply-weighted): {fmtPct(avgUtil,0)}.
            </div>
          </div>
        </section>
      );
    }

    function GFRwaPartners() {
      const P = GF.rwaPartners || { curators: [], funds: [] };
      const gtd = { padding: '9px 10px', fontSize: 13, borderBottom: '1px solid var(--border)', verticalAlign: 'top' };
      const gth = { textAlign: 'left', padding: '8px 10px', fontSize: 11, color: 'var(--fg-muted)', textTransform: 'uppercase', letterSpacing: '.04em', borderBottom: '1px solid var(--border)' };
      const A = ({ href, children }) => href ? <a href={href} target="_blank" rel="noopener" style={{ color: GC.blue, textDecoration: 'none' }}>{children}</a> : <span style={{ color: 'var(--fg-dim)' }}>-</span>;
      const fitColor = (f) => f === 'High' ? GC.live : f.startsWith('Med-High') ? GC.gold : GC.accent;
      const totalRwa = P.curators.reduce((s, c) => s + c.rwaUsd, 0);
      const T = P.tranchers || [];
      const activeT = T.filter(t => t.poolCount > 0);
      const creditTvl = T.reduce((s, t) => s + (t.tvlUsd || 0), 0);
      const apyFmt = (v) => v == null ? '-' : v.toFixed(1) + '%';
      return (
        <section style={{ padding: 24 }}>
          <h1 className="h1">GoldFish · RWA partners, on-chain data</h1>
          <p className="sub" style={{ marginTop: 6 }}>Live on-chain metrics (DefiLlama). Credit-tranching protocols and RWA-comfortable curators.</p>
          <div style={{ marginTop: 20 }}>
            <GKpiRow items={[
              { l: 'RWA Curators', v: String(P.curators.length), d: 'hold RWA · can run a vault', c: GC.blue },
              { l: 'Curator RWA AUM', v: fmtUSD(totalRwa), d: 'live RWA allocations', c: GC.live },
              { l: 'Credit-Tranching Protocols', v: String(activeT.length) + '/' + String(T.length), d: 'active / listed', c: GC.gold },
              { l: 'Combined Credit TVL', v: fmtUSD(creditTvl), d: 'on-chain, all protocols', c: GC.accent },
            ]} />
          </div>

          <div style={{ marginTop: 16 }}>
            <GPanel title="Credit-tranching protocols, on-chain metrics" sub="DefiLlama live · TVL · tranche APY (senior→junior) · 30d fees">
              <div style={{ overflowX: 'auto' }}>
              <table style={{ width: '100%', borderCollapse: 'collapse', minWidth: 720 }}>
                <thead><tr>
                  <th style={gth}>Protocol</th>
                  <th style={{...gth,textAlign:'right'}}>TVL</th>
                  <th style={{...gth,textAlign:'right'}}>Pools</th>
                  <th style={{...gth,textAlign:'right'}}>Senior APY</th>
                  <th style={{...gth,textAlign:'right'}}>Junior APY</th>
                  <th style={{...gth,textAlign:'right'}}>Spread</th>
                  <th style={{...gth,textAlign:'right'}}>Fees 30d</th>
                  <th style={gth}>Contact</th>
                </tr></thead>
                <tbody>
                  {T.map(f => {
                    const dead = !f.poolCount;
                    return (
                    <tr key={f.name} style={{ opacity: dead ? 0.5 : 1 }}>
                      <td style={{...gtd, fontWeight:600, whiteSpace:'nowrap'}}>{f.name}{f.star && <span title="credit tranching (USD3/sUSD3)" style={{ color: GC.gold, marginLeft:6 }}>◆</span>}<div style={{fontSize:11, fontWeight:400, color:'var(--fg-dim)'}}>{(f.chains||[]).slice(0,3).join(', ') || '-'}</div></td>
                      <td style={{...gtd, textAlign:'right', fontFamily:'var(--font-mono)'}}>{f.tvlUsd==null ? '-' : fmtUSD(f.tvlUsd)}</td>
                      <td style={{...gtd, textAlign:'right', fontFamily:'var(--font-mono)', color:'var(--fg-muted)'}}>{f.poolCount||'-'}</td>
                      <td style={{...gtd, textAlign:'right', fontFamily:'var(--font-mono)'}}>{apyFmt(f.seniorApy)}{f.seniorSym && <div style={{fontSize:10, color:'var(--fg-dim)'}}>{f.seniorSym}</div>}</td>
                      <td style={{...gtd, textAlign:'right', fontFamily:'var(--font-mono)'}}>{apyFmt(f.juniorApy)}{f.juniorSym && f.juniorSym!==f.seniorSym && <div style={{fontSize:10, color:'var(--fg-dim)'}}>{f.juniorSym}</div>}</td>
                      <td style={{...gtd, textAlign:'right', fontFamily:'var(--font-mono)', color: f.spreadPct>=3 ? GC.gold : 'var(--fg-muted)', fontWeight: f.spreadPct>=3?600:400}}>{f.spreadPct==null ? '-' : f.spreadPct.toFixed(1)+'%'}</td>
                      <td style={{...gtd, textAlign:'right', fontFamily:'var(--font-mono)', color:'var(--fg-muted)'}}>{fmtUSD(f.fees30dUsd||0)}</td>
                      <td style={{...gtd, fontSize:12, whiteSpace:'nowrap'}}><A href={f.x}>X</A> · <A href={f.site}>site</A></td>
                    </tr>
                  );})}
                </tbody>
              </table>
              </div>
              <div style={{ marginTop: 10, fontSize: 11, color: 'var(--fg-dim)' }}>Spread = junior APY − senior APY (genuine tranching). 0 pools = no live on-chain pools. RWA collateral issuers: {(P.issuers||[]).map((s,i)=>(<span key={s.name}>{i>0 && ' · '}<A href={s.site}>{s.name}</A></span>))}</div>
            </GPanel>
          </div>

          <div style={{ marginTop: 16 }}>
            <GPanel title="RWA curators, can run a GGBR/USDC vault on Morpho" sub="on-chain RWA allocation · total AUM · contacts">
              <table style={{ width: '100%', borderCollapse: 'collapse' }}>
                <thead><tr><th style={gth}>Curator</th><th style={{...gth,textAlign:'right'}}>RWA $</th><th style={{...gth,textAlign:'right'}}>Total AUM</th><th style={gth}>RWA they hold</th><th style={gth}>Contact</th></tr></thead>
                <tbody>
                  {P.curators.map(c => (
                    <tr key={c.name}>
                      <td style={{...gtd, fontWeight:600}}><CuratorName name={c.name} address={c.address} morphoListed={c.morphoListed} /></td>
                      <td style={{...gtd, textAlign:'right', fontFamily:'var(--font-mono)'}}>{fmtUSD(c.rwaUsd)}</td>
                      <td style={{...gtd, textAlign:'right', fontFamily:'var(--font-mono)', color:'var(--fg-muted)'}}>{fmtUSD(c.aumUsd)}</td>
                      <td style={{...gtd, fontSize:11, color:'var(--fg-muted)'}}>{c.holds.slice(0,5).join(', ')}</td>
                      <td style={{...gtd, fontSize:12, whiteSpace:'nowrap'}}><A href={c.twitter}>X</A> · <A href={c.site}>site</A>{c.forum && <> · <A href={c.forum}>forum</A></>}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </GPanel>
          </div>
        </section>
      );
    }

    const NAV = [
      { id: 'overview', label: 'Overview', C: Overview },
      { id: 'curators', label: 'Curators', C: Curators },
      { id: 'method', label: 'Methodology', C: Method },
      { id: 'gf-demand', label: 'Gold Demand', C: GFDemand, section: 'GoldFish' },
      { id: 'gf-rwa', label: 'RWA partners', C: GFRwaPartners, section: 'GoldFish' },
    ];

    function App() {
      const [active, setActive] = useState('overview');
      const Page = NAV.find(n => n.id === active).C;
      return (
        <>
          <aside className="sidebar">
            <div className="brand">
              <div className="brand-logo"></div>
              <div className="brand-name">curator index</div>
            </div>
            <nav className="nav">
              {NAV.map(n => (
                <a key={n.id} href="#" className={`nav-item ${active === n.id ? 'active' : ''}`}
                  onClick={e => { e.preventDefault(); setActive(n.id); }}>{n.label}</a>
              ))}
            </nav>
          </aside>
          <header className="topbar">
            <div className="breadcrumb"><span>Lending Curators</span><span className="sep">/</span><span style={{ color: 'var(--fg)' }}>{NAV.find(n => n.id === active).label}</span></div>
          </header>
          <main className="main"><Page /></main>
          <footer className="statusbar"><span>CURATOR INDEX</span><span>· {fmtUSD(D.meta.totalAumUsd)} AUM · {D.meta.curatorCount} curators · {D.meta.generated.slice(0,10)}</span></footer>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
